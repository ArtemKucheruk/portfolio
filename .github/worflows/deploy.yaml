name: Deploy Personal portfolio

on:
  push:
    branch: [ production ]

jobs:
  deploy:
    runs-on: ubuntu-lates

    steps:
      - name: Deploy via ssh
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/portfolio_artem
            git pull git@artem.github.com:ArtemKucheruk/portfolio.git
            npm run build
            systemctl restart portfolio_artem

